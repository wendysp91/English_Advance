<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Study Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    h1 {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #a9a9c8;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    /* ── Nav ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .nav button {
      background: #1e1e2e;
      border: 1px solid #2e2e44;
      color: #c0c0d8;
      width: 36px; height: 36px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav button:hover { background: #2a2a3e; }
    .nav-label {
      font-size: 1.1rem;
      font-weight: 600;
      min-width: 180px;
      text-align: center;
      color: #d0d0e8;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px 20px;
      margin-bottom: 24px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #8888aa;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    /* ── Grid header ── */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      max-width: 700px;
      margin: 0 auto 4px;
    }
    .weekday {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: #555570;
      letter-spacing: 0.06em;
      padding-bottom: 6px;
      text-transform: uppercase;
    }

    /* ── Calendar grid ── */
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      max-width: 700px;
      margin: 0 auto;
    }

    .day-cell {
      background: #1a1a26;
      border: 1px solid #222234;
      border-radius: 10px;
      padding: 8px 6px 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
    }
    .day-cell:hover { border-color: #44446a; background: #1e1e2e; }
    .day-cell.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
    .day-cell.today { border-color: #5a5af0 !important; }
    .day-cell.future { opacity: 0.6; }
    .day-cell.future:hover { border-color: #33334a; }

    .day-num {
      font-size: 0.8rem;
      font-weight: 600;
      color: #9090b0;
      line-height: 1;
    }
    .today .day-num {
      background: #5a5af0;
      color: #fff;
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Activity dots ── */
    .dots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #2e2e44;
      transition: background 0.15s;
    }
    .dot.on { }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #1a1a26;
      border: 1px solid #2e2e44;
      border-radius: 16px;
      padding: 28px 28px 24px;
      width: min(360px, 90vw);
    }
    .modal h2 {
      font-size: 1rem;
      color: #a9a9c8;
      margin-bottom: 20px;
      text-align: center;
    }

    .activity-list { display: flex; flex-direction: column; gap: 10px; }

    .activity-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #12121c;
      border: 2px solid #2a2a40;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
      color: #c0c0d8;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .activity-btn:hover { background: #1e1e2e; }
    .activity-btn.checked {
      border-color: var(--c);
      background: color-mix(in srgb, var(--c) 12%, #12121c);
      color: #fff;
    }

    .activity-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      background: #2a2a40;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .activity-btn.checked .activity-icon {
      background: var(--c);
    }

    .check-mark {
      margin-left: auto;
      font-size: 1rem;
      color: var(--c);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .activity-btn.checked .check-mark { opacity: 1; }

    .modal-close {
      display: block;
      width: 100%;
      margin-top: 18px;
      background: #2a2a40;
      border: none;
      border-radius: 10px;
      color: #9090b0;
      padding: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .modal-close:hover { background: #33334a; }

    /* ── Stats bar ── */
    .stats {
      max-width: 700px;
      margin: 24px auto 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .stat-card {
      background: #1a1a26;
      border: 1px solid #222234;
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
    }
    .stat-label {
      font-size: 0.68rem;
      color: #55557a;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
    }
    .stat-sub {
      font-size: 0.65rem;
      color: #55557a;
      margin-top: 2px;
    }

    /* ── Streak ── */
    .streak-bar {
      max-width: 700px;
      margin: 10px auto 0;
      background: #1a1a26;
      border: 1px solid #222234;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .streak-info { font-size: 0.8rem; color: #6666a0; }
    .streak-count { font-size: 1.3rem; font-weight: 700; color: #f0a030; }

    /* ── Sync bar ── */
    .sync-bar {
      max-width: 700px;
      margin: 10px auto 0;
      display: flex;
      gap: 8px;
    }
    .sync-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #2e2e44;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    .sync-btn.export {
      background: #1a1a26;
      color: #7c6ef7;
    }
    .sync-btn.export:hover { background: #22223a; }
    .sync-btn.import {
      background: #1a1a26;
      color: #30bfbf;
    }
    .sync-btn.import:hover { background: #1a2a2a; }
    .sync-hint {
      max-width: 700px;
      margin: 8px auto 0;
      font-size: 0.7rem;
      color: #44445a;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>English Study Tracker</h1>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#7c6ef7"></div>Shadowing</div>
    <div class="legend-item"><div class="legend-dot" style="background:#30bfbf"></div>Anki</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f06292"></div>Input</div>
    <div class="legend-item"><div class="legend-dot" style="background:#66bb6a"></div>Speaking</div>
  </div>

  <div class="nav">
    <button id="prevBtn">&#8592;</button>
    <div class="nav-label" id="navLabel"></div>
    <button id="nextBtn">&#8594;</button>
  </div>

  <div class="weekdays">
    <div class="weekday">Dom</div>
    <div class="weekday">Lun</div>
    <div class="weekday">Mar</div>
    <div class="weekday">Mié</div>
    <div class="weekday">Jue</div>
    <div class="weekday">Vie</div>
    <div class="weekday">Sáb</div>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="stats" id="stats"></div>

  <div class="streak-bar">
    <div class="streak-info">Racha actual (días con todo completo)</div>
    <div class="streak-count" id="streakCount">0 🔥</div>
  </div>

  <div class="sync-bar">
    <button class="sync-btn export" id="exportBtn">⬇ Exportar datos (tracker-data.json)</button>
    <button class="sync-btn import" id="importBtn">⬆ Importar datos (.json)</button>
  </div>
  <div class="sync-hint">Exporta, haz commit del JSON a git y en otra compu importa ese archivo para sincronizar tu progreso.</div>
  <input type="file" id="fileInput" accept=".json" style="display:none" />

  <!-- Modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modalDate"></h2>
      <div class="activity-list" id="activityList"></div>
      <button class="modal-close" id="modalClose">Cerrar</button>
    </div>
  </div>

  <script>
    const ACTIVITIES = [
      { key: "shadowing", label: "Shadowing",  icon: "🎙️", color: "#7c6ef7" },
      { key: "anki",      label: "Anki",       icon: "🃏", color: "#30bfbf" },
      { key: "input",     label: "Input",      icon: "🎧", color: "#f06292" },
      { key: "speaking",  label: "Speaking",   icon: "💬", color: "#66bb6a" },
    ];

    const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
                       "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

    // ── Storage ──────────────────────────────────────────
    const STORE_KEY = "english_tracker_v1";

    function loadData() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
      catch { return {}; }
    }
    function saveData(data) {
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    }
    function dayKey(y, m, d) {
      return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    }

    // ── State ─────────────────────────────────────────────
    const today = new Date();
    let viewYear  = today.getFullYear();
    let viewMonth = today.getMonth();
    let data = loadData();
    let openKey  = null;

    // ── Calendar render ───────────────────────────────────
    function render() {
      const cal = document.getElementById("calendar");
      cal.innerHTML = "";

      const firstDay = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      document.getElementById("navLabel").textContent =
        `${MONTHS_ES[viewMonth]} ${viewYear}`;

      // blank cells
      for (let i = 0; i < firstDay; i++) {
        const blank = document.createElement("div");
        blank.className = "day-cell empty";
        cal.appendChild(blank);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const key = dayKey(viewYear, viewMonth, d);
        const cell = document.createElement("div");
        cell.className = "day-cell";

        const cellDate = new Date(viewYear, viewMonth, d);
        const isToday  = cellDate.toDateString() === today.toDateString();
        const isFuture = cellDate > today;

        if (isToday)  cell.classList.add("today");
        if (isFuture) cell.classList.add("future"); // visually dimmed but clickable

        // day number
        const num = document.createElement("div");
        num.className = "day-num";
        num.textContent = d;
        cell.appendChild(num);

        // dots
        const dots = document.createElement("div");
        dots.className = "dots";
        const dayData = data[key] || {};
        ACTIVITIES.forEach(a => {
          const dot = document.createElement("div");
          dot.className = "dot" + (dayData[a.key] ? " on" : "");
          if (dayData[a.key]) dot.style.background = a.color;
          dots.appendChild(dot);
        });
        cell.appendChild(dots);

        cell.addEventListener("click", () => openModal(key, d));
        cal.appendChild(cell);
      }

      renderStats();
      renderStreak();
    }

    // ── Modal ─────────────────────────────────────────────
    function openModal(key, d) {
      openKey = key;
      document.getElementById("modalDate").textContent =
        `${d} de ${MONTHS_ES[viewMonth]}, ${viewYear}`;

      const list = document.getElementById("activityList");
      list.innerHTML = "";
      const dayData = data[key] || {};

      ACTIVITIES.forEach(a => {
        const btn = document.createElement("button");
        btn.className = "activity-btn" + (dayData[a.key] ? " checked" : "");
        btn.style.setProperty("--c", a.color);

        btn.innerHTML = `
          <div class="activity-icon">${a.icon}</div>
          <span>${a.label}</span>
          <span class="check-mark">✓</span>
        `;
        btn.addEventListener("click", () => toggleActivity(key, a.key, btn));
        list.appendChild(btn);
      });

      document.getElementById("overlay").classList.add("open");
    }

    function toggleActivity(key, actKey, btn) {
      if (!data[key]) data[key] = {};
      data[key][actKey] = !data[key][actKey];
      if (!data[key][actKey]) delete data[key][actKey];
      if (Object.keys(data[key]).length === 0) delete data[key];
      saveData(data);
      btn.classList.toggle("checked");
      render(); // refresh dots
      // re-open same modal
      openModal(key, parseInt(key.split("-")[2]));
    }

    document.getElementById("modalClose").addEventListener("click", () => {
      document.getElementById("overlay").classList.remove("open");
    });
    document.getElementById("overlay").addEventListener("click", e => {
      if (e.target === document.getElementById("overlay"))
        document.getElementById("overlay").classList.remove("open");
    });

    // ── Stats ─────────────────────────────────────────────
    function renderStats() {
      const statsEl = document.getElementById("stats");
      statsEl.innerHTML = "";

      // Count for current month
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const counts = { shadowing: 0, anki: 0, input: 0, speaking: 0 };
      let fullDays = 0;

      for (let d = 1; d <= daysInMonth; d++) {
        const key = dayKey(viewYear, viewMonth, d);
        const dd = data[key] || {};
        let all = true;
        ACTIVITIES.forEach(a => {
          if (dd[a.key]) counts[a.key]++;
          else all = false;
        });
        if (all && Object.keys(dd).length === ACTIVITIES.length) fullDays++;
      }

      ACTIVITIES.forEach(a => {
        const card = document.createElement("div");
        card.className = "stat-card";
        card.innerHTML = `
          <div class="stat-label">${a.icon} ${a.label}</div>
          <div class="stat-value" style="color:${a.color}">${counts[a.key]}</div>
          <div class="stat-sub">días este mes</div>
        `;
        statsEl.appendChild(card);
      });
    }

    function renderStreak() {
      let streak = 0;
      const d = new Date(today);
      while (true) {
        const key = dayKey(d.getFullYear(), d.getMonth(), d.getDate());
        const dd = data[key] || {};
        const complete = ACTIVITIES.every(a => dd[a.key]);
        if (!complete) break;
        streak++;
        d.setDate(d.getDate() - 1);
      }
      document.getElementById("streakCount").textContent =
        streak === 0 ? "0" : `${streak} 🔥`;
    }

    // ── Nav ───────────────────────────────────────────────
    document.getElementById("prevBtn").addEventListener("click", () => {
      viewMonth--;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      const nextMonth = new Date(today.getFullYear(), today.getMonth() + 1, 1);
      if (viewYear > nextMonth.getFullYear() ||
         (viewYear === nextMonth.getFullYear() && viewMonth >= nextMonth.getMonth())) return;
      viewMonth++;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      render();
    });

    // ── Export / Import ───────────────────────────────────
    document.getElementById("exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = "tracker-data.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById("importBtn").addEventListener("click", () => {
      document.getElementById("fileInput").click();
    });

    document.getElementById("fileInput").addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const imported = JSON.parse(ev.target.result);
          data = { ...data, ...imported }; // merge: imported wins on conflict
          saveData(data);
          render();
          alert("¡Datos importados correctamente!");
        } catch {
          alert("El archivo no es válido.");
        }
        e.target.value = "";
      };
      reader.readAsText(file);
    });

    // ── Init ──────────────────────────────────────────────
    render();
  </script>
</body>
</html>
